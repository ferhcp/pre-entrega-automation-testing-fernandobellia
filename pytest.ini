[pytest]

# Directorio raíz donde pytest busca los tests
testpaths = tests

# Convenciones de nombrado (estándar de pytest)
python_files   = test_*.py
python_classes = Test*
python_functions = test_*


addopts =
    --html=reports/reporte.html
    --self-contained-html
    -v


markers =
    smoke:      Tests críticos de humo (ejecución rápida, funcionalidades clave)
    regression: Suite de regresión completa
    e2e:        Tests de flujo completo end-to-end
    login:      Tests del módulo de autenticación
    inventory:  Tests del módulo de inventario/productos
    checkout:   Tests del flujo de compra y checkout
    negativo:   Tests de casos negativos y manejo de errores
    parametrizado: Tests que usan pytest.mark.parametrize
